schema: infra

X3CustomerPull:
  kind: task
  cadence: 10mins
  reads: [x3api.customer, x3db.bpcustomer, exportmaster.customer]
  writes: [x3rocs.customer, x3rocs.contact, x3rocs.pricediscount, logs.x3customerpull]

x3api.customer:
  kind: api

x3db:
  kind: database
  serves: [x3db.bpcustomer]

x3db.bpcustomer:
  kind: table

x3rocs:
  kind: database
  service: PostgreSQL
  serves: [x3rocs.customer, x3rocs.contact, x3rocs.pricediscount]

x3rocs.customer:
  kind: table
  
x3.customers_needing_em_update:
  kind: view
  reads: [x3.customer]

exportmaster:
  kind: database
  service: Exportmaster
  serves: [exportmaster.customer]

exportmaster.customer:
  kind: table

EMUpdater:
  kind: task
  cadence: 10mins
  reads: [x3.customers_needing_em_update]
  writes: [exportmaster-dll, logs-emupdater]

RIVSEM01:
  kind: machine
  hosts: [Exportmaster, exportmaster-dll]

PostgreSQL:
  kind: service

RIVSPROD01:
  kind: machine
  hosts: [x3rocs, smtp]  

exportmaster-dll:
  kind: service


