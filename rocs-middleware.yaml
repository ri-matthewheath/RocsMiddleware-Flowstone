schema: infra

X3CustomerPull:
  kind: task
  cadence: 10mins
  selects: [x3api.customer, x3db.bpcustomer, exportmaster.customer]
  upserts: [x3rocs.customer, x3rocs.contact, x3rocs.pricediscount]
  writes: [logs.x3customerpull]

x3api.customer:
  kind: api

x3db:
  kind: database
  serves: [x3db.bpcustomer]

x3db.bpcustomer:
  kind: recordset

x3rocs:
  kind: database
  service: PostgreSQL
  serves: [x3rocs.customer, x3rocs.contact, x3rocs.pricediscount]

x3rocs.customer:
  kind: recordset
  
x3.customers_needing_em_update:
  kind: recordset
  selects: [x3.customer]

exportmaster:
  kind: database
  service: Exportmaster
  serves: [exportmaster.customer]

exportmaster.customer:
  kind: recordset

EMUpdater:
  kind: task
  cadence: 10mins
  selects: [x3.customers_needing_em_update]
  writes: [logs.emupdater]
  sends: [exportmaster-dll]

RIVSEM01:
  kind: machine
  hosts: [Exportmaster, exportmaster-dll]

PostgreSQL:
  kind: service

RIVSPROD01:
  kind: machine
  hosts: [x3rocs, smtp]  

exportmaster-dll:
  kind: service

smtp:
  kind: service

